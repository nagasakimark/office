<script>
(function() {
    const fontCSS = `
        /* Map Montserrat Medium */
        @font-face {
            font-family: "Montserrat";
            src: url("https://nagasakimark.github.io/office/1.ttf") format("truetype");
            font-weight: 500;
        }
        /* Map Montserrat Thin */
        @font-face {
            font-family: "Montserrat";
            src: url("https://nagasakimark.github.io/office/2.ttf") format("truetype");
            font-weight: 100;
        }
        /* Map Montserrat ExtraLight */
        @font-face {
            font-family: "Montserrat";
            src: url("https://nagasakimark.github.io/office/3.ttf") format("truetype");
            font-weight: 200;
        }

        /* Force the Canvas to prioritize these external font-face rules */
        canvas, .asc-window, .canvas-text-writer {
            text-rendering: optimizeLegibility !important;
            -webkit-font-smoothing: antialiased !important;
        }
    `;

    const injectToIframe = () => {
        const frames = document.querySelectorAll('iframe');
        frames.forEach(frame => {
            try {
                const doc = frame.contentDocument || frame.contentWindow.document;
                if (doc && !doc.getElementById('teacher-font-override')) {
                    const style = doc.createElement('style');
                    style.id = 'teacher-font-override';
                    style.innerHTML = fontCSS;
                    doc.head.appendChild(style);
                    console.log("Handwriting weights injected into editor frame.");
                }
            } catch (e) {
                // Cross-origin blocks might happen, but standard embeds usually allow this
            }
        });
    };

    // Run every 2 seconds to ensure it catches re-renders or tab switches
    setInterval(injectToIframe, 2000);
})();
</script>
