<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office</title>
    <style>
        :root {
            --board-green: #1a3c34;
            --chalk-dust: rgba(255, 255, 255, 0.08);
            --wood-trim: #5d4037;
        }

        html, body {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background-color: var(--board-green);
            font-family: 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
        }

        #selection-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 10;
            transition: opacity 0.5s ease;
            background: radial-gradient(circle at 50% 50%, var(--chalk-dust) 0%, transparent 70%),
                        linear-gradient(rgba(0,0,0,0.1) 1px, transparent 1px), var(--board-green);
            background-size: 100% 100%, 100% 4px, auto;
        }

        #selection-screen::after {
            content: ""; position: absolute; bottom: 0; width: 100%; height: 20px;
            background: var(--wood-trim); border-top: 4px solid #3e2723;
        }

        body.room-loaded #selection-screen { opacity: 0; pointer-events: none; }

        h1 { color: white; font-size: 2.8rem; margin-bottom: 3rem; text-shadow: 2px 2px 0px rgba(0,0,0,0.2); }

        #school-options { display: flex; gap: 50px; z-index: 11; }

        .school-card { cursor: pointer; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .school-card:hover { transform: scale(1.06) translateY(-10px); }

        .image-frame {
            border: 14px solid #ffffff; border-radius: 2px;
            width: 400px; height: 300px; overflow: hidden; background: #222;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .image-frame img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.9); }

        #ds-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: white; }
    </style>
</head>
<body>

    <div id="ds-frame"></div>

    <div id="selection-screen">
        <h1>学校を選択してください</h1>
        <div id="school-options">
            <div class="school-card" onclick="loadRoom('2473906', 'QnprQjhESlVFQndaeGFsWU0vTWFnMjhjeDhXVW41bzZraVZKTmlRZ3RJQT0_ImQ3MzM4YmFjLWY0MmUtNGEyYS1iYmZiLWJjOTI2YzAxOGY4NiI')">
                <div class="image-frame"><img src="elementary.png" alt="Elementary"></div>
            </div>
            <div class="school-card" onclick="loadRoom('2484523', 'SlVpM1F3a0wybW8wRDVSbitiTmRpRlpCMGxtYTRSYmI2dzhqREpxOS8zcz0_IjM3NjQ5ODIwLTllYzEtNDhkNi04MDg1LTMxNTJjZTJkMDVhYSI')">
                <div class="image-frame"><img src="jhs.png" alt="JHS"></div>
            </div>
        </div>
    </div>

    <script>
        function loadRoom(roomId, token) {
            document.body.classList.add('room-loaded');
            
            // We use the full set of filter queries that ONLYOFFICE expects for its public initialization
            const script = document.createElement('script');
            const params = new URLSearchParams({
                src: 'https://docspace-ddipri.onlyoffice.com',
                mode: 'public-room',
                id: roomId,
                requestToken: token,
                frameId: 'ds-frame',
                width: '100%',
                height: '100%',
                init: 'true',
                showHeader: 'true',
                showTitle: 'true',
                showMenu: 'false',
                showFilter: 'true',
                // This specific combination is most reliable for forcing Thumbnail/Alphabetical view
                'filter[sortby]': 'Name',
                'filter[sortorder]': 'ascending',
                'filter[view]': '9', // 9 = Thumbnail/Grid view
                'filter[count]': '100'
            });

            script.src = `https://docspace-ddipri.onlyoffice.com/static/scripts/sdk/2.1.0/api.js?${params.toString()}`;
            document.body.appendChild(script);
        }
    </script>
</body>
</html>
