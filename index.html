<script>
// 1. Hijack the "open" command BEFORE the SDK loads
(function() {
    const originalOpen = window.open;
    window.open = function(url, target, features) {
        if (url && url.includes('onlyoffice.com')) {
            // Instead of opening a new tab, redirect the current IFRAME
            const frame = document.getElementById('ds-frame').querySelector('iframe');
            if (frame) {
                frame.src = url;
                return frame.contentWindow; 
            }
        }
        return originalOpen(url, target, features);
    };
})();
</script>

<script>
// 3. Inject the Montserrat Handwriting overrides
(function() {
    const fontCSS = `
        @font-face { font-family: "Montserrat"; src: url("https://nagasakimark.github.io/office/1.ttf"); font-weight: 500; }
        @font-face { font-family: "Montserrat"; src: url("https://nagasakimark.github.io/office/2.ttf"); font-weight: 100; }
        @font-face { font-family: "Montserrat"; src: url("https://nagasakimark.github.io/office/3.ttf"); font-weight: 200; }
    `;

    setInterval(() => {
        const frame = document.querySelector('#ds-frame iframe');
        if (frame && frame.contentDocument) {
            const head = frame.contentDocument.head;
            if (head && !head.querySelector('#handwriting-style')) {
                const s = frame.contentDocument.createElement('style');
                s.id = 'handwriting-style';
                s.innerHTML = fontCSS;
                head.appendChild(s);
            }
        }
    }, 2000);
})();
</script>
